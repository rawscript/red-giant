name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build and test matrix ─────────────────────────────────────────────
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.crypto }} / ${{ matrix.sanitizer }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 — GCC 11 + libsodium + ASan/UBSan (primary)
          - os: ubuntu-22.04
            compiler: gcc-11
            cc: gcc-11
            cxx: g++-11
            crypto: libsodium
            sanitizer: asan-ubsan
            cmake_extra: -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

          # Ubuntu 22.04 — GCC 11 + OpenSSL + ASan/UBSan
          - os: ubuntu-22.04
            compiler: gcc-11
            cc: gcc-11
            cxx: g++-11
            crypto: openssl
            sanitizer: asan-ubsan
            cmake_extra: -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

          # Ubuntu 22.04 — Clang 14 + libsodium + ASan/UBSan
          - os: ubuntu-22.04
            compiler: clang-14
            cc: clang-14
            cxx: clang++-14
            crypto: libsodium
            sanitizer: asan-ubsan
            cmake_extra: -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

          # Ubuntu 22.04 — Clang 14 + libsodium + TSan
          - os: ubuntu-22.04
            compiler: clang-14
            cc: clang-14
            cxx: clang++-14
            crypto: libsodium
            sanitizer: tsan
            cmake_extra: -DCMAKE_C_FLAGS="-fsanitize=thread -fno-omit-frame-pointer"

          # Ubuntu 24.04 — GCC 13 + libsodium (latest Ubuntu)
          - os: ubuntu-24.04
            compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            crypto: libsodium
            sanitizer: none
            cmake_extra: ""

          # macOS 13 — Apple Clang + libsodium + ASan
          - os: macos-13
            compiler: apple-clang
            cc: clang
            cxx: clang++
            crypto: libsodium
            sanitizer: asan
            cmake_extra: -DCMAKE_C_FLAGS="-fsanitize=address"

          # macOS 14 — Apple Clang + libsodium + ASan
          - os: macos-14
            compiler: apple-clang
            cc: clang
            cxx: clang++
            crypto: libsodium
            sanitizer: asan
            cmake_extra: -DCMAKE_C_FLAGS="-fsanitize=address"

          # Windows Server 2022 — MSVC + OpenSSL + /fsanitize=address
          - os: windows-2022
            compiler: msvc
            cc: cl
            cxx: cl
            crypto: openssl
            sanitizer: asan
            cmake_extra: -DCMAKE_C_FLAGS="/fsanitize=address"

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ${{ matrix.compiler }} \
            cmake ninja-build \
            libsodium-dev \
            libssl-dev \
            cppcheck \
            clang-tidy-14 || true

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install cmake ninja libsodium openssl@3 cppcheck

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-2022'
        run: |
          choco install cmake ninja openssl --no-progress -y

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DRGTP_CRYPTO_BACKEND=${{ matrix.crypto }} \
            -DRGTP_BUILD_TESTS=ON \
            -DRGTP_ENABLE_FEC=ON \
            -DRGTP_ENABLE_SIMD=ON \
            ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Static analysis
        if: matrix.sanitizer == 'asan-ubsan' && startsWith(matrix.os, 'ubuntu')
        run: cmake --build build --target analyze || true

  # ── ARM cross-compilation ─────────────────────────────────────────────
  cross-compile:
    name: Cross-compile ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: aarch64-linux-gnu
            toolchain: cmake/toolchains/aarch64-linux-gnu.cmake
            qemu: qemu-aarch64-static
          - target: arm-linux-gnueabihf
            toolchain: cmake/toolchains/arm-linux-gnueabihf.cmake
            qemu: qemu-arm-static

    steps:
      - uses: actions/checkout@v6

      - name: Install cross-toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            cmake ninja-build \
            qemu-user-static

      - name: Configure (cross)
        run: |
          cmake -B build-cross -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ matrix.toolchain }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DRGTP_CRYPTO_BACKEND=libsodium \
            -DRGTP_BUILD_TESTS=OFF

      - name: Build (cross)
        run: cmake --build build-cross --parallel

  # ── Fuzz targets (60 seconds per target on PR) ────────────────────────
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [fuzz_parser, fuzz_merkle_verifier, fuzz_fec_decoder, fuzz_pull_handler]

    steps:
      - uses: actions/checkout@v6

      - name: Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-14 cmake ninja-build libsodium-dev

      - name: Configure (fuzz)
        env:
          CC: clang-14
          CXX: clang++-14
        run: |
          cmake -B build-fuzz -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DRGTP_CRYPTO_BACKEND=libsodium \
            -DRGTP_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=fuzzer,address,undefined"

      - name: Build fuzz target
        run: cmake --build build-fuzz --target ${{ matrix.target }} --parallel

      - name: Run fuzz (60s)
        run: |
          ./build-fuzz/tests/fuzz/${{ matrix.target }} \
            -max_total_time=60 \
            -max_len=65536 \
            tests/fuzz/corpus/ || true

  # ── Coverage gate ─────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-11 cmake ninja-build libsodium-dev lcov

      - name: Configure (coverage)
        env:
          CC: gcc-11
        run: |
          cmake -B build-cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DRGTP_CRYPTO_BACKEND=libsodium \
            -DRGTP_BUILD_TESTS=ON \
            -DRGTP_ENABLE_FEC=ON \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"

      - name: Build and test
        run: |
          cmake --build build-cov --parallel
          ctest --test-dir build-cov --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture --directory build-cov \
               --output-file coverage.info \
               --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' \
               --output-file coverage-filtered.info
          lcov --summary coverage-filtered.info

      - name: Check coverage gate (90% line coverage)
        run: |
          LINE_COV=$(lcov --summary coverage-filtered.info 2>&1 | \
                     grep "lines" | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Line coverage: ${LINE_COV}%"
          python3 -c "
          cov = float('${LINE_COV}')
          if cov < 90.0:
              print(f'FAIL: Line coverage {cov:.1f}% < 90% threshold')
              exit(1)
          print(f'PASS: Line coverage {cov:.1f}% >= 90%')
          "
